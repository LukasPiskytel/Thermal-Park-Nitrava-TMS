name: Refresh pool temperatures

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call refresh endpoint
        run: |
          curl -sS -X GET "https://thermal-park-nitrava-tms-backend.vercel.app/api/pools/refresh" \
            -H "Accept: application/json"
